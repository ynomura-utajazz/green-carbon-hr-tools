<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>バリューアワード | Green Carbon HR</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f3;color:#1a1a2e;min-height:100vh}header{background:linear-gradient(135deg,#2d6a4f,#1b4332);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:16px}.back-btn{color:#fff;text-decoration:none;font-size:14px;opacity:.8}.back-btn:hover{opacity:1}header h1{font-size:22px;font-weight:700}.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 24px}.tab{padding:14px 20px;cursor:pointer;font-size:14px;font-weight:500;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}.tab.active{color:#2d6a4f;border-bottom-color:#2d6a4f}.tab-content{display:none;padding:24px;max-width:1200px;margin:0 auto}.tab-content.active{display:block}.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}.value-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}.mvp-box{background:linear-gradient(135deg,#f4a261,#e76f51);color:#fff;border-radius:12px;padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}.mvp-box .trophy{font-size:48px}.mvp-box h3{font-size:18px;font-weight:700}.mvp-box p{opacity:.9;font-size:14px}.filter-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:13px;transition:.2s}.filter-btn.active,.filter-btn:hover{background:#2d6a4f;color:#fff;border-color:#2d6a4f}.nominations-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}.nom-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-left:4px solid #ccc}.nom-card .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}.nom-card .recipient{font-size:16px;font-weight:700}.nom-card .from{font-size:12px;color:#888;margin-top:4px}.nom-card .msg{font-size:13px;color:#444;line-height:1.6}.nom-card .date{font-size:11px;color:#aaa;margin-top:10px}.form-group{margin-bottom:18px}.form-group label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px}.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;transition:.2s}.form-group select:focus,.form-group textarea:focus{border-color:#2d6a4f;outline:none}.value-btns{display:flex;flex-wrap:wrap;gap:8px}.value-btn{padding:8px 14px;border-radius:8px;border:2px solid;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}.char-count{font-size:11px;color:#999;text-align:right;margin-top:4px}.submit-btn{background:linear-gradient(135deg,#2d6a4f,#52b788);color:#fff;border:none;padding:12px 32px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:.2s}.submit-btn:hover{opacity:.9}.success-msg{display:none;background:#d4edda;border:1px solid #c3e6cb;border-radius:8px;padding:16px;text-align:center;color:#155724;margin-top:16px}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}.chart-container{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}table{width:100%;border-collapse:collapse}th{background:#f5f5f5;padding:10px 14px;text-align:left;font-size:13px;font-weight:600;color:#555}td{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:14px}tr:hover td{background:#f9f9f9}.rank-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.rank-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:14px}.rank-num{font-size:32px;min-width:48px;text-align:center}.rank-info .name{font-weight:700;font-size:15px}.rank-info .dept{font-size:12px;color:#888;margin:2px 0}.rank-info .count{font-size:13px;color:#2d6a4f;font-weight:600}.section-title{font-size:16px;font-weight:700;color:#2d6a4f;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #e8f5e9}</style></head><body><script>if(sessionStorage.getItem("gc-auth")!=="ok"){location.href="../index.html";}</script><header><a href="../index.html" class="back-btn">&#8592; ダッシュボード</a><h1>&#127942; バリューアワード</h1></header><div class="tabs"><div class="tab active" onclick="switchTab('list',event)">アワード一覧</div><div class="tab" onclick="switchTab('nominate',event)">ノミネート送信</div><div class="tab" onclick="switchTab('stats',event)">バリュー統計</div><div class="tab" onclick="switchTab('ranking',event)">ランキング</div></div><div id="tab-list" class="tab-content active"><div class="mvp-box"><div class="trophy">&#127942;</div><div><h3>今月のMVP &mdash; 野村裕太</h3><p>5月は3件のノミネートを受賞。Challenge &amp; Impact の体現者として選出されました。</p></div></div><div class="filter-btns"><button class="filter-btn active" onclick="filterNoms('all',this)">すべて</button><button class="filter-btn" onclick="filterNoms('Challenge',this)">&#128293; Challenge</button><button class="filter-btn" onclick="filterNoms('Co-Creation',this)">&#129309; Co-Creation</button><button class="filter-btn" onclick="filterNoms('Integrity',this)">&#9994; Integrity</button><button class="filter-btn" onclick="filterNoms('Impact',this)">&#9889; Impact</button><button class="filter-btn" onclick="filterNoms('Sustainability',this)">&#127807; Sustainability</button><button class="filter-btn" onclick="filterNoms('Global',this)">&#127757; Global</button></div><div class="nominations-grid" id="nominations-grid"></div></div><div id="tab-nominate" class="tab-content"><div class="card" style="max-width:600px;margin:0 auto"><h2 class="section-title" style="margin-bottom:20px">仲間をノミネートする</h2><div class="form-group"><label>受賞者</label><select id="recipient"><option value="">選択してください</option><option>野村裕太</option><option>鎌田彩</option><option>土井圭太</option><option>原田梨沙</option><option>塚本真純</option><option>古山健一</option><option>川崎健太</option><option>南部さくら</option><option>石川拓哉</option><option>藤本渉</option><option>藤原恵</option><option>下城哲哉</option><option>中尾幸一</option><option>串田和也</option></select></div><div class="form-group"><label>体現したバリュー</label><div class="value-btns" id="value-btns"><button class="value-btn" style="border-color:#e63946;color:#e63946" onclick="selectValue('Challenge',this)">&#128293; Challenge</button><button class="value-btn" style="border-color:#457b9d;color:#457b9d" onclick="selectValue('Co-Creation',this)">&#129309; Co-Creation</button><button class="value-btn" style="border-color:#2d6a4f;color:#2d6a4f" onclick="selectValue('Integrity',this)">&#9994; Integrity</button><button class="value-btn" style="border-color:#f4a261;color:#f4a261" onclick="selectValue('Impact',this)">&#9889; Impact</button><button class="value-btn" style="border-color:#52b788;color:#52b788" onclick="selectValue('Sustainability',this)">&#127807; Sustainability</button><button class="value-btn" style="border-color:#457b9d;color:#457b9d" onclick="selectValue('Global',this)">&#127757; Global</button></div></div><div class="form-group"><label>メッセージ（150文字以上推奨）</label><textarea id="msg" rows="5" placeholder="どんな行動がバリューを体現していましたか？" oninput="updateCount()"></textarea><div class="char-count"><span id="char-count">0</span> / 150文字以上推奨</div></div><button class="submit-btn" onclick="submitNom()">ノミネートを送信 &#127942;</button><div class="success-msg" id="success-msg">&#10003; ノミネートを送信しました！あなたの感謝がチームを輝かせます。</div></div></div><div id="tab-stats" class="tab-content"><div class="stats-grid"><div class="chart-container"><h3 class="section-title">バリュー別ノミネーション数（5月）</h3><canvas id="valueChart" height="250"></canvas></div><div class="chart-container"><h3 class="section-title">Top 10 受賞者</h3><table><thead><tr><th>氏名</th><th>受賞数</th></tr></thead><tbody id="top-receivers"></tbody></table></div></div><div class="chart-container"><h3 class="section-title">Top 10 ノミネーター</h3><table><thead><tr><th>氏名</th><th>送信数</th></tr></thead><tbody id="top-nominators"></tbody></table></div></div><div id="tab-ranking" class="tab-content"><h2 class="section-title" style="margin-bottom:20px">Q2 総合ランキング</h2><div class="rank-cards" id="rank-cards"></div></div><script>const VC={Challenge:'#e63946','Co-Creation':'#457b9d',Integrity:'#2d6a4f',Impact:'#f4a261',Sustainability:'#52b788',Global:'#a8dadc'};const noms=[{id:1,to:"野村裕太",from:"鎌田彩",value:"Challenge",msg:"新しい炭素クレジット市場の開拓に果敢に挑戦し、チーム全体を鼓舞してくれました。",date:"2026-05-07"},{id:2,to:"鎌田彩",from:"土井圭太",value:"Co-Creation",msg:"部門横断のプロジェクトで積極的に他部署と連携し、素晴らしい成果を出してくれました。",date:"2026-05-06"},{id:3,to:"原田梨沙",from:"塚本真純",value:"Integrity",msg:"困難な状況でも正直に報告し、チームの信頼を守ってくれました。",date:"2026-05-05"},{id:4,to:"塚本真純",from:"野村裕太",value:"Impact",msg:"クライアントへの提案が高く評価され、大型案件の受注につながりました。",date:"2026-05-04"},{id:5,to:"古山健一",from:"川崎健太",value:"Sustainability",msg:"長期的視点でプロジェクトの持続可能性を常に考え、正しい方向へ導いてくれました。",date:"2026-05-03"},{id:6,to:"川崎健太",from:"南部さくら",value:"Global",msg:"海外クライアントとの交渉で文化的配慮を示し、グローバルな信頼を築いてくれました。",date:"2026-05-02"},{id:7,to:"南部さくら",from:"古山健一",value:"Challenge",msg:"新しいデータ分析手法を独学で習得し、チームに展開してくれました。",date:"2026-05-01"},{id:8,to:"土井圭太",from:"原田梨沙",value:"Co-Creation",msg:"週次ミーティングで建設的な意見を出し、チームの議論を豊かにしてくれます。",date:"2026-04-30"},{id:9,to:"野村裕太",from:"古山健一",value:"Impact",msg:"Q1のKPI達成に向けて全力でチームをサポートし、目標を120%達成しました。",date:"2026-04-28"},{id:10,to:"鎌田彩",from:"塚本真純",value:"Integrity",msg:"ミスが発生した際に即座に報告し、迅速な対応でダメージを最小限に抑えてくれました。",date:"2026-04-25"},{id:11,to:"石川拓哉",from:"野村裕太",value:"Global",msg:"インドネシア市場の調査レポートが質高く、経営陣から高評価を得ました。",date:"2026-04-24"},{id:12,to:"藤本渉",from:"鎌田彩",value:"Sustainability",msg:"再エネプロジェクトの長期計画を丁寧に設計し、将来世代への責任を体現しています。",date:"2026-04-22"},{id:13,to:"藤原恵",from:"土井圭太",value:"Challenge",msg:"難易度の高い技術的課題に粘り強く取り組み、ブレークスルーを実現しました。",date:"2026-04-20"},{id:14,to:"下城哲哉",from:"原田梨沙",value:"Co-Creation",msg:"新入社員のメンタリングを献身的に行い、チーム全体の底上げに貢献しています。",date:"2026-04-18"},{id:15,to:"中尾幸一",from:"川崎健太",value:"Impact",msg:"顧客満足度調査で最高スコアを記録。クライアントリレーション構築の模範です。",date:"2026-04-15"},{id:16,to:"串田和也",from:"南部さくら",value:"Integrity",msg:"複雑な利益相反状況でも公正な判断を下し、チームの信頼を一層高めてくれました。",date:"2026-04-12"},{id:17,to:"野村裕太",from:"石川拓哉",value:"Challenge",msg:"業界初の取り組みをリードし、Green Carbonのブランド向上に大きく貢献しました。",date:"2026-04-10"},{id:18,to:"塚本真純",from:"藤本渉",value:"Global",msg:"多国籍チームのコーディネーションを見事にこなし、プロジェクトを成功に導きました。",date:"2026-04-08"},{id:19,to:"鎌田彩",from:"串田和也",value:"Sustainability",msg:"カーボンオフセット事業の持続的成長モデルを構築し、事業の安定化に貢献しました。",date:"2026-04-05"},{id:20,to:"古山健一",from:"藤原恵",value:"Impact",msg:"新規パートナーシップ締結により売上30%増を達成。圧倒的な成果を残しました。",date:"2026-04-03"}];let selV='';function switchTab(t,e){document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');e.target.classList.add('active');if(t==='stats')initStats();if(t==='ranking')initRanking();}function filterNoms(v,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const g=document.getElementById('nominations-grid');const f=v==='all'?noms:noms.filter(n=>n.value===v);g.innerHTML=f.map(n=>`<div class="nom-card" style="border-left-color:${VC[n.value]}"><div class="header"><div><div class="recipient">&#127942; ${n.to}</div><div class="from">from ${n.from}</div></div><span class="value-badge" style="background:${VC[n.value]}">${n.value}</span></div><div class="msg">${n.msg}</div><div class="date">${n.date}</div></div>`).join('');}function selectValue(v,btn){selV=v;document.querySelectorAll('.value-btn').forEach(b=>{b.classList.remove('selected');b.style.background='#fff';b.style.color=b.style.borderColor;});btn.classList.add('selected');btn.style.background=VC[v];btn.style.color='#fff';}function updateCount(){document.getElementById('char-count').textContent=document.getElementById('msg').value.length;}function submitNom(){const r=document.getElementById('recipient').value,m=document.getElementById('msg').value;if(!r||!selV||m.length<10){alert('受賞者、バリュー、メッセージを入力してください');return;}document.getElementById('success-msg').style.display='block';document.getElementById('recipient').value='';document.getElementById('msg').value='';document.getElementById('char-count').textContent='0';selV='';document.querySelectorAll('.value-btn').forEach(b=>{b.classList.remove('selected');b.style.background='#fff';});}function initStats(){const c={};noms.forEach(n=>{c[n.value]=(c[n.value]||0)+1;});const ctx=document.getElementById('valueChart').getContext('2d');if(window._vc)window._vc.destroy();window._vc=new Chart(ctx,{type:'bar',data:{labels:Object.keys(c),datasets:[{data:Object.values(c),backgroundColor:Object.keys(c).map(v=>VC[v])}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});const rec={};noms.forEach(n=>{rec[n.to]=(rec[n.to]||0)+1;});document.getElementById('top-receivers').innerHTML=Object.entries(rec).sort((a,b)=>b[1]-a[1]).slice(0,10).map((e,i)=>`<tr><td>${i+1}. ${e[0]}</td><td>${e[1]}件</td></tr>`).join('');const nom={};noms.forEach(n=>{nom[n.from]=(nom[n.from]||0)+1;});document.getElementById('top-nominators').innerHTML=Object.entries(nom).sort((a,b)=>b[1]-a[1]).slice(0,10).map((e,i)=>`<tr><td>${i+1}. ${e[0]}</td><td>${e[1]}件</td></tr>`).join('');}function initRanking(){const rec={};noms.forEach(n=>{if(!rec[n.to])rec[n.to]={count:0,vals:{}};rec[n.to].count++;rec[n.to].vals[n.value]=(rec[n.to].vals[n.value]||0)+1;});const s=Object.entries(rec).sort((a,b)=>b[1].count-a[1].count);const m=['&#127941;','&#129352;','&#129353;'];document.getElementById('rank-cards').innerHTML=s.map((e,i)=>{const tv=Object.entries(e[1].vals).sort((a,b)=>b[1]-a[1])[0][0];return`<div class="rank-card"><div class="rank-num">${m[i]||'#'+(i+1)}</div><div class="rank-info"><div class="name">${e[0]}</div><div class="dept"><span class="value-badge" style="background:${VC[tv]}">${tv}</span></div><div class="count">獲得: ${e[1].count}件</div></div></div>`;}).join('');}filterNoms('all',document.querySelector('.filter-btn'));</script></body></html>
