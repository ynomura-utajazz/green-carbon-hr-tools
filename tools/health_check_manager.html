<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>健康診断管理 | Green Carbon HR</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f3;color:#1a1a2e;min-height:100vh}header{background:linear-gradient(135deg,#2d6a4f,#1b4332);color:#fff;padding:20px 24px;display:flex;align-items:center;gap:16px}.back-btn{color:#fff;text-decoration:none;font-size:14px;opacity:.8}.back-btn:hover{opacity:1}header h1{font-size:22px;font-weight:700}.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;padding:0 24px}.tab{padding:14px 20px;cursor:pointer;font-size:14px;font-weight:500;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.2s}.tab.active{color:#2d6a4f;border-bottom-color:#2d6a4f}.tab-content{display:none;padding:24px;max-width:1200px;margin:0 auto}.tab-content.active{display:block}.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}.summary-card{border-radius:12px;padding:18px;color:#fff;text-align:center}.summary-card h3{font-size:32px;font-weight:800;margin-bottom:4px}.summary-card p{font-size:13px;opacity:.9}.section-title{font-size:16px;font-weight:700;color:#2d6a4f;margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid #e8f5e9}.chart-grid{display:grid;grid-template-columns:300px 1fr;gap:20px;margin-bottom:24px}.prog-row{margin-bottom:12px}.prog-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}.prog-bar{height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}.prog-fill{height:100%;background:linear-gradient(90deg,#2d6a4f,#52b788);border-radius:4px}.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}.filters input,.filters select{padding:8px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}.filters input:focus,.filters select:focus{border-color:#2d6a4f;outline:none}.export-btn{margin-left:auto;background:#2d6a4f;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}th{background:#f5f5f5;padding:12px 14px;text-align:left;font-size:13px;font-weight:600;color:#555;cursor:pointer;user-select:none}th:hover{background:#eee}td{padding:11px 14px;border-bottom:1px solid #f0f0f0;font-size:14px}tr:hover td{background:#f9fffe;cursor:pointer}.result-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;color:#fff}.badge-A{background:#2d6a4f}.badge-B{background:#52b788}.badge-C{background:#f4a261}.badge-D{background:#e63946}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}.modal.open{display:flex}.modal-box{background:#fff;border-radius:16px;padding:28px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto}.modal-box h3{font-size:18px;font-weight:700;margin-bottom:16px;color:#2d6a4f}.modal-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}.modal-row label{color:#888;font-size:13px}.close-btn{background:#f0f0f0;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;margin-top:16px;width:100%}.schedule-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}.schedule-item{background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 2px 6px rgba(0,0,0,.07);display:flex;align-items:center;gap:14px}.sched-date{background:#2d6a4f;color:#fff;border-radius:8px;padding:8px 12px;text-align:center;min-width:60px}.sched-date .day{font-size:22px;font-weight:800;line-height:1}.sched-date .mon{font-size:11px;opacity:.9}.sched-info .name{font-weight:600;font-size:15px}.sched-info .detail{font-size:12px;color:#888;margin-top:2px}.reminder-badge{margin-left:auto;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}.form-group{margin-bottom:14px}.form-group label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:5px}.form-group input,.form-group select{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit}.form-group input:focus,.form-group select:focus{border-color:#2d6a4f;outline:none}.add-btn{background:#2d6a4f;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}.law-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}.law-card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}.law-card .law-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}.law-card .status-icon{font-size:24px;min-width:32px}.law-card .law-title{font-size:14px;font-weight:700}.law-card .law-ref{font-size:11px;color:#999;margin-top:2px}.law-card .law-note{font-size:13px;color:#555;line-height:1.5}.law-card.ok{border-left:4px solid #2d6a4f}.law-card.warn{border-left:4px solid #f4a261}.law-card.ng{border-left:4px solid #e63946}</style></head><body><script>if(sessionStorage.getItem("gc-auth")!=="ok"){location.href="../index.html";}<\/script><header><a href="../index.html" class="back-btn">&#8592; ダッシュボード</a><h1>&#127973; 健康診断管理</h1></header><div class="tabs"><div class="tab active" onclick="switchTab('dashboard',event)">ダッシュボード</div><div class="tab" onclick="switchTab('employees',event)">社員別管理</div><div class="tab" onclick="switchTab('schedule',event)">スケジュール管理</div><div class="tab" onclick="switchTab('law',event)">法令チェック</div></div><div id="tab-dashboard" class="tab-content active"><div class="summary-grid"><div class="summary-card" style="background:linear-gradient(135deg,#2d6a4f,#52b788)"><h3 id="cnt-done">0</h3><p>受診済み</p></div><div class="summary-card" style="background:linear-gradient(135deg,#f4a261,#e76f51)"><h3 id="cnt-pending">0</h3><p>未受診</p></div><div class="summary-card" style="background:linear-gradient(135deg,#ffd166,#f4a261)"><h3 id="cnt-recheck">0</h3><p>要再検査</p></div><div class="summary-card" style="background:linear-gradient(135deg,#e63946,#c1121f)"><h3 id="cnt-urgent">0</h3><p>要精密検査</p></div></div><div class="chart-grid"><div class="card"><h3 class="section-title">受診状況</h3><canvas id="donutChart"></canvas></div><div class="card"><h3 class="section-title">部署別受診率</h3><div id="dept-progress"></div></div></div></div><div id="tab-employees" class="tab-content"><div class="filters"><input type="text" id="search" placeholder="&#128269; 氏名検索" oninput="renderTable()"><select id="dept-filter" onchange="renderTable()"><option value="">全部署</option></select><select id="result-filter" onchange="renderTable()"><option value="">全結果</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="未受診">未受診</option></select><button class="export-btn" onclick="exportCSV()">&#128229; CSV出力</button></div><table><thead><tr><th onclick="sortBy('id')">#</th><th onclick="sortBy('name')">氏名</th><th onclick="sortBy('dept')">部署</th><th onclick="sortBy('date')">受診日</th><th onclick="sortBy('result')">結果</th><th>要精密検査</th><th>備考</th></tr></thead><tbody id="emp-tbody"></tbody></table></div><div id="tab-schedule" class="tab-content"><h2 class="section-title" style="margin-bottom:16px">今後の健診スケジュール</h2><div class="schedule-list" id="schedule-list"></div><div class="card" style="max-width:500px"><h3 class="section-title">受診予定を追加</h3><div class="form-group"><label>氏名</label><input type="text" id="s-name" placeholder="例: 山田太郎"></div><div class="form-group"><label>受診日</label><input type="date" id="s-date"></div><div class="form-group"><label>医療機関</label><input type="text" id="s-clinic" placeholder="例: 東京中央クリニック"></div><div class="form-group"><label>健診種別</label><select id="s-type"><option>定期健診</option><option>特殊健診</option><option>深夜業健診</option><option>雇入時健診</option></select></div><button class="add-btn" onclick="addSchedule()">予定を追加</button></div></div><div id="tab-law" class="tab-content"><h2 class="section-title" style="margin-bottom:20px">法令遵守チェックリスト</h2><div class="law-grid" id="law-grid"></div></div><div class="modal" id="emp-modal" onclick="closeModal(event)"><div class="modal-box" id="modal-content"></div></div><script>const employees=[{id:1,name:"野村裕太",dept:"経営企画",date:"2026-03-15",result:"A",followup:false,note:""},{id:2,name:"鎌田彩",dept:"人事",date:"2026-03-15",result:"B",followup:false,note:"血圧やや高め"},{id:3,name:"土井圭太",dept:"事業開発",date:"2026-03-20",result:"C",followup:true,note:"要再検査: 血糖値"},{id:4,name:"原田梨沙",dept:"マーケティング",date:"2026-03-20",result:"A",followup:false,note:""},{id:5,name:"塚本真純",dept:"人事",date:"2026-03-22",result:"B",followup:false,note:""},{id:6,name:"古山健一",dept:"事業開発",date:"2026-04-01",result:"A",followup:false,note:""},{id:7,name:"川崎健太",dept:"技術",date:"2026-04-01",result:"B",followup:false,note:"コレステロール注意"},{id:8,name:"南部さくら",dept:"経理",date:"2026-04-05",result:"A",followup:false,note:""},{id:9,name:"石川拓哉",dept:"グローバル",date:"2026-04-05",result:"C",followup:true,note:"要精密検査: 肝機能"},{id:10,name:"藤本渉",dept:"技術",date:"2026-04-10",result:"A",followup:false,note:""},{id:11,name:"藤原恵",dept:"技術",date:"2026-04-10",result:"B",followup:false,note:""},{id:12,name:"下城哲哉",dept:"事業開発",date:"2026-04-15",result:"A",followup:false,note:""},{id:13,name:"中尾幸一",dept:"営業",date:"2026-04-15",result:"D",followup:true,note:"要精密検査: 心電図異常"},{id:14,name:"串田和也",dept:"法務",date:"2026-04-20",result:"A",followup:false,note:""},{id:15,name:"Martinez Luis",dept:"グローバル",date:"2026-04-20",result:"B",followup:false,note:""},{id:16,name:"Saw Jasmine",dept:"グローバル",date:"2026-04-22",result:"A",followup:false,note:""},{id:17,name:"Nguyen Thanh",dept:"グローバル",date:"2026-04-22",result:"A",followup:false,note:""},{id:18,name:"Wibowo Agus",dept:"技術",date:"2026-04-25",result:"B",followup:false,note:""},{id:19,name:"Tirza Grace",dept:"マーケティング",date:null,result:null,followup:false,note:"未受診"},{id:20,name:"Galina Sofia",dept:"研究",date:null,result:null,followup:false,note:"未受診"},{id:21,name:"Nyakoon Cath",dept:"グローバル",date:"2026-04-28",result:"A",followup:false,note:""},{id:22,name:"Olga Kira",dept:"研究",date:null,result:null,followup:false,note:"日程調整中"},{id:23,name:"Aimen Sara",dept:"グローバル",date:"2026-04-28",result:"B",followup:false,note:""},{id:24,name:"Esha Grace",dept:"研究",date:"2026-05-02",result:"A",followup:false,note:""},{id:25,name:"Lee Felicia",dept:"営業",date:null,result:null,followup:false,note:"未受診"}];const schedules=[{name:"Tirza Grace",date:"2026-05-15",clinic:"渋谷メディカルセンター",type:"定期健診"},{name:"Galina Sofia",date:"2026-05-20",clinic:"東京中央クリニック",type:"定期健診"},{name:"Olga Kira",date:"2026-05-22",clinic:"新宿健診プラザ",type:"定期健診"},{name:"Lee Felicia",date:"2026-05-28",clinic:"品川クリニック",type:"定期健診"},{name:"土井圭太",date:"2026-06-05",clinic:"東京中央クリニック",type:"定期健診"}];const laws=[{status:"ok",icon:"✅",title:"年1回定期健康診断の実施",ref:"労安法第66条第1項",note:"2026年3月〜4月に全社員対象で実施済み（受診率80%）"},{status:"warn",icon:"⚠️",title:"深夜業従事者の6ヶ月毎健診",ref:"労安法第66条第1項",note:"深夜業従事者3名のうち1名が6ヶ月以内未受診"},{status:"ok",icon:"✅",title:"有害業務従事者の特殊健康診断",ref:"労安法第66条第2項",note:"該当する有害業務従事者なし"},{status:"ok",icon:"✅",title:"健診結果の記録・5年間保存",ref:"労安法第66条の3",note:"電子記録システムで保存中"},{status:"warn",icon:"⚠️",title:"異常所見者への医師意見聴取",ref:"労安法第66条の4",note:"C・D判定3名について産業医意見聴取が未完了"},{status:"ok",icon:"✅",title:"就業上の措置の実施",ref:"労安法第66条の5",note:"医師意見に基づく措置を実施済み"},{status:"ok",icon:"✅",title:"健診結果の本人通知",ref:"労安法第66条の6",note:"全受診者に結果通知書を送付済み"}];let sortCol='id',sortDir=1;function switchTab(t,e){document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');e.target.classList.add('active');}function initDashboard(){const done=employees.filter(e=>e.result).length;const pending=employees.filter(e=>!e.result).length;const recheck=employees.filter(e=>e.result==='C').length;const urgent=employees.filter(e=>e.followup).length;document.getElementById('cnt-done').textContent=done;document.getElementById('cnt-pending').textContent=pending;document.getElementById('cnt-recheck').textContent=recheck;document.getElementById('cnt-urgent').textContent=urgent;const ctx=document.getElementById('donutChart').getContext('2d');new Chart(ctx,{type:'doughnut',data:{labels:['受診済み(A)','受診済み(B)','要再検査(C)','要精密(D)','未受診'],datasets:[{data:[employees.filter(e=>e.result==='A').length,employees.filter(e=>e.result==='B').length,recheck,urgent,pending],backgroundColor:['#2d6a4f','#52b788','#f4a261','#e63946','#ccc']}]},options:{plugins:{legend:{position:'bottom'}}}});const depts={};employees.forEach(e=>{if(!depts[e.dept])depts[e.dept]={total:0,done:0};depts[e.dept].total++;if(e.result)depts[e.dept].done++;});document.getElementById('dept-progress').innerHTML=Object.entries(depts).map(([d,v])=>{const pct=Math.round(v.done/v.total*100);return`<div class="prog-row"><div class="prog-label"><span>${d}</span><span>${v.done}/${v.total} (${pct}%)</span></div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;}).join('');const df=document.getElementById('dept-filter');[...new Set(employees.map(e=>e.dept))].forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;df.appendChild(o);});renderTable();initSchedule();initLaw();}function renderTable(){const s=document.getElementById('search').value.toLowerCase();const df=document.getElementById('dept-filter').value;const rf=document.getElementById('result-filter').value;let data=[...employees].filter(e=>{if(s&&!e.name.toLowerCase().includes(s))return false;if(df&&e.dept!==df)return false;if(rf){if(rf==='未受診'&&e.result)return false;if(rf!=='未受診'&&e.result!==rf)return false;}return true;}).sort((a,b)=>{const va=a[sortCol]??'';const vb=b[sortCol]??'';return va<vb?-sortDir:va>vb?sortDir:0;});document.getElementById('emp-tbody').innerHTML=data.map(e=>`<tr onclick="showModal(${e.id})"><td>${e.id}</td><td>${e.name}</td><td>${e.dept}</td><td>${e.date||'—'}</td><td>${e.result?`<span class="result-badge badge-${e.result}">${e.result}</span>`:'未受診'}</td><td style="text-align:center">${e.followup?'⚠️':''}</td><td style="font-size:12px;color:#888">${e.note}</td></tr>`).join('');}function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}renderTable();}function showModal(id){const e=employees.find(x=>x.id===id);document.getElementById('modal-content').innerHTML=`<h3>&#127973; ${e.name}</h3><div class="modal-row"><label>部署</label><span>${e.dept}</span></div><div class="modal-row"><label>受診日</label><span>${e.date||'未受診'}</span></div><div class="modal-row"><label>結果</label><span>${e.result?`<span class="result-badge badge-${e.result}">${e.result}</span>`:'—'}</span></div><div class="modal-row"><label>要精密検査</label><span>${e.followup?'⚠️ 要対応':'なし'}</span></div><div class="modal-row"><label>備考</label><span>${e.note||'—'}</span></div><button class="close-btn" onclick="document.getElementById('emp-modal').classList.remove('open')">閉じる</button>`;document.getElementById('emp-modal').classList.add('open');}function closeModal(e){if(e.target===document.getElementById('emp-modal'))document.getElementById('emp-modal').classList.remove('open');}function exportCSV(){const data=employees.map(e=>[e.id,e.name,e.dept,e.date||'未受診',e.result||'—',e.followup?'要対応':'なし',e.note].join(','));const csv='No.,氏名,部署,受診日,結果,要精密検査,備考\n'+data.join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);a.download='健康診断管理_'+new Date().toISOString().slice(0,10)+'.csv';a.click();}function initSchedule(){document.getElementById('schedule-list').innerHTML=schedules.map(s=>{const d=new Date(s.date);return`<div class="schedule-item"><div class="sched-date"><div class="day">${d.getDate()}</div><div class="mon">${d.getMonth()+1}月</div></div><div class="sched-info"><div class="name">${s.name}</div><div class="detail">${s.clinic} | ${s.type}</div></div><span class="reminder-badge" style="background:#e8f5e9;color:#2d6a4f">&#128197; 予定</span></div>`;}).join('');}function addSchedule(){const n=document.getElementById('s-name').value,d=document.getElementById('s-date').value,c=document.getElementById('s-clinic').value,t=document.getElementById('s-type').value;if(!n||!d||!c){alert('氏名・受診日・医療機関を入力してください');return;}schedules.push({name:n,date:d,clinic:c,type:t});schedules.sort((a,b)=>a.date.localeCompare(b.date));initSchedule();document.getElementById('s-name').value='';document.getElementById('s-date').value='';document.getElementById('s-clinic').value='';}function initLaw(){document.getElementById('law-grid').innerHTML=laws.map(l=>`<div class="law-card ${l.status}"><div class="law-header"><div class="status-icon">${l.icon}</div><div><div class="law-title">${l.title}</div><div class="law-ref">${l.ref}</div></div></div><div class="law-note">${l.note}</div></div>`).join('');}initDashboard();<\/script></body></html>
