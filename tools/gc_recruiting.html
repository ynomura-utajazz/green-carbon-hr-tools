<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採用管理 Premium | Green Carbon HR</title>
<style>
:root {
  --gc-green: #2d6a4f;
  --gc-light: #52b788;
  --gc-pale: #d8f3dc;
  --gc-dark: #1b4332;
  --gc-accent: #40916c;
  --text: #1a1a2e;
  --bg: #f0faf4;
  --card: #ffffff;
  --border: #b7e4c7;
  --shadow: 0 2px 12px rgba(27,67,50,0.1);
  --radius: 10px;
  --red: #e63946;
  --orange: #f4a261;
  --yellow: #e9c46a;
  --blue: #457b9d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,var(--gc-dark) 0%,var(--gc-green) 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:10px;flex:1}
.hdr-logo{font-size:18px;font-weight:700;letter-spacing:.5px}
.hdr-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.hdr-subtitle{font-size:13px;opacity:.75}
.hdr-right{display:flex;align-items:center;gap:10px}
.sync-badge{display:flex;align-items:center;gap:4px;font-size:12px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px;cursor:pointer}
.sync-badge.synced{background:rgba(82,183,136,.3)}
.sync-badge.local{background:rgba(244,162,97,.3)}
.lang-toggle{display:flex;border:1px solid rgba(255,255,255,.3);border-radius:6px;overflow:hidden;cursor:pointer}
.lang-toggle span{padding:4px 10px;font-size:12px;font-weight:600;transition:.2s}
.lang-toggle span.active{background:rgba(255,255,255,.25)}
.hdr-home{color:rgba(255,255,255,.7);text-decoration:none;font-size:12px;white-space:nowrap}
.hdr-home:hover{color:#fff}

/* NAV */
.nav{background:#fff;border-bottom:2px solid var(--border);display:flex;overflow-x:auto;padding:0 16px}
.nav-btn{padding:14px 18px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:#666;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;display:flex;align-items:center;gap:6px}
.nav-btn.active{color:var(--gc-green);border-bottom-color:var(--gc-green)}
.nav-btn:hover{color:var(--gc-dark)}

/* VIEWS */
.view{display:none;padding:24px;max-width:1400px;margin:0 auto}
.view.active{display:block}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-left:4px solid var(--gc-green)}
.kpi-card.orange{border-left-color:var(--orange)}
.kpi-card.blue{border-left-color:var(--blue)}
.kpi-card.red{border-left-color:var(--red)}
.kpi-label{font-size:12px;color:#888;margin-bottom:6px;font-weight:500}
.kpi-value{font-size:28px;font-weight:700;color:var(--gc-dark)}
.kpi-sub{font-size:11px;color:#aaa;margin-top:4px}

/* SECTION HEADER */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:16px;font-weight:700;color:var(--gc-dark)}
.sec-actions{display:flex;gap:8px}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--gc-green);color:#fff}
.btn-primary:hover{background:var(--gc-dark)}
.btn-outline{background:#fff;color:var(--gc-green);border:1.5px solid var(--gc-green)}
.btn-outline:hover{background:var(--gc-pale)}
.btn-sm{padding:5px 10px;font-size:12px}

/* FUNNEL */
.funnel-wrap{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:24px}
.funnel-stages{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap}
.funnel-stage{flex:1;min-width:80px;text-align:center}
.funnel-bar-wrap{height:120px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:8px}
.funnel-bar{width:60px;border-radius:6px 6px 0 0;transition:.5s;position:relative;min-height:6px}
.funnel-bar .bar-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:700;color:var(--gc-dark);white-space:nowrap}
.funnel-stage-name{font-size:11px;color:#666;font-weight:500}

/* ACTIVITY LOG */
.activity-log{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);max-height:300px;overflow-y:auto}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--gc-light);margin-top:5px;flex-shrink:0}
.activity-text{font-size:13px;line-height:1.4}
.activity-time{font-size:11px;color:#aaa;white-space:nowrap;margin-left:auto;flex-shrink:0}

/* DEPARTMENT TABLE */
.dept-table{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.dept-table table{width:100%;border-collapse:collapse}
.dept-table th{background:var(--gc-dark);color:#fff;padding:10px 14px;font-size:12px;font-weight:600;text-align:left}
.dept-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f0f0f0}
.dept-table tr:hover td{background:var(--gc-pale)}
.progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;min-width:80px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gc-light),var(--gc-green));border-radius:3px;transition:.5s}

/* KANBAN */
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:600px}
.kanban-col{flex-shrink:0;width:200px;background:#f5f5f5;border-radius:var(--radius);display:flex;flex-direction:column}
.kanban-col-header{padding:12px 14px;font-size:13px;font-weight:700;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between}
.kanban-count{background:rgba(255,255,255,.5);border-radius:20px;padding:2px 7px;font-size:11px;font-weight:700}
.kanban-cards{flex:1;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.kanban-cards.drag-over{background:rgba(82,183,136,.15);border-radius:0 0 var(--radius) var(--radius)}
.kanban-card{background:#fff;border-radius:8px;padding:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);cursor:pointer;transition:.2s;border-left:3px solid var(--gc-light)}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.kanban-card.dragging{opacity:.5;transform:scale(.95)}
.kanban-card.priority-high{border-left-color:var(--red)}
.kanban-card.priority-mid{border-left-color:var(--orange)}
.kanban-card.priority-low{border-left-color:var(--gc-light)}
.card-name{font-size:13px;font-weight:700;margin-bottom:3px}
.card-pos{font-size:11px;color:#888;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.card-flag{font-size:14px}
.card-days{font-size:11px;color:#aaa}
.priority-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.priority-badge.high{background:#fde2e2;color:var(--red)}
.priority-badge.mid{background:#fef3db;color:#c78000}
.priority-badge.low{background:#e0f4ea;color:var(--gc-green)}

/* COL COLORS */
.col-applied .kanban-col-header{background:#74c69d;color:#fff}
.col-screening .kanban-col-header{background:#52b788;color:#fff}
.col-first .kanban-col-header{background:#40916c;color:#fff}
.col-second .kanban-col-header{background:#2d6a4f;color:#fff}
.col-final .kanban-col-header{background:#1b4332;color:#fff}
.col-offer .kanban-col-header{background:#457b9d;color:#fff}
.col-accepted .kanban-col-header{background:#1d3557;color:#fff}
.col-rejected .kanban-col-header{background:#adb5bd;color:#fff}

/* CANDIDATE LIST */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;background:#fff;min-width:140px}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:var(--gc-green)}
.table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.cand-table{width:100%;border-collapse:collapse}
.cand-table th{background:var(--gc-dark);color:#fff;padding:11px 14px;font-size:12px;font-weight:600;text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
.cand-table th:hover{background:var(--gc-green)}
.cand-table td{padding:11px 14px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.cand-table tr:hover td{background:#f8fffe;cursor:pointer}
.stage-chip{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600}
.stage-applied{background:#e8f5e9;color:#2d6a4f}
.stage-screening{background:#e0f2fe;color:#0369a1}
.stage-first{background:#fef9c3;color:#854d0e}
.stage-second{background:#fce7f3;color:#9d174d}
.stage-final{background:#ede9fe;color:#5b21b6}
.stage-offer{background:#d1fae5;color:#065f46}
.stage-accepted{background:#1b4332;color:#d8f3dc}
.stage-rejected{background:#fee2e2;color:#991b1b}

/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:#fff;border-radius:14px;width:min(760px,95vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:18px 24px;background:linear-gradient(135deg,var(--gc-dark),var(--gc-green));color:#fff;display:flex;align-items:center;gap:12px}
.modal-header h2{font-size:16px;font-weight:700;flex:1}
.modal-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-tabs{display:flex;border-bottom:2px solid var(--border);padding:0 16px;background:#fafafa}
.modal-tab{padding:12px 16px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:#888;border-bottom:3px solid transparent;transition:.2s}
.modal-tab.active{color:var(--gc-green);border-bottom-color:var(--gc-green)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-tab-pane{display:none}
.modal-tab-pane.active{display:block}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:600;color:#555}
.form-group input,.form-group select,.form-group textarea{padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gc-green)}
.form-group textarea{resize:vertical;min-height:80px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* VALUES EVAL */
.values-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.value-card{background:#fafafa;border-radius:8px;padding:14px;border:1px solid var(--border)}
.value-name{font-size:13px;font-weight:700;color:var(--gc-dark);margin-bottom:4px}
.value-desc{font-size:11px;color:#888;margin-bottom:8px}
.star-rating{display:flex;gap:4px;margin-bottom:8px}
.star{font-size:20px;cursor:pointer;color:#ddd;transition:.15s;user-select:none}
.star.active{color:#f59e0b}
.star:hover,.star.hover{color:#f59e0b}

/* INTERVIEW RECORD */
.interview-list{display:flex;flex-direction:column;gap:12px}
.interview-item{background:#f8f8f8;border-radius:8px;padding:14px;border-left:3px solid var(--gc-light)}
.interview-meta{display:flex;gap:12px;font-size:12px;color:#888;margin-bottom:6px;flex-wrap:wrap}
.verdict-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.verdict-pass{background:#d1fae5;color:#065f46}
.verdict-hold{background:#fef3db;color:#c78000}
.verdict-fail{background:#fee2e2;color:#991b1b}

/* MEMO TIMELINE */
.memo-timeline{display:flex;flex-direction:column;gap:10px}
.memo-item{background:#f0f9f5;border-radius:8px;padding:12px;position:relative;border-left:3px solid var(--gc-pale)}
.memo-item-header{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px}
.memo-text{font-size:13px;line-height:1.5}
.add-memo-form{display:flex;gap:8px;margin-top:12px}
.add-memo-form textarea{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;min-height:60px;resize:none}

/* JOBS */
.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.job-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-top:4px solid var(--gc-green)}
.job-card.inactive{border-top-color:#adb5bd;opacity:.75}
.job-title{font-size:15px;font-weight:700;color:var(--gc-dark);margin-bottom:4px}
.job-dept{font-size:12px;color:#888;margin-bottom:12px}
.job-stats{display:flex;gap:14px;margin-bottom:12px}
.job-stat{text-align:center}
.job-stat-v{font-size:18px;font-weight:700;color:var(--gc-green)}
.job-stat-l{font-size:11px;color:#aaa}
.job-status{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.job-status.active{background:#d1fae5;color:#065f46}
.job-status.closed{background:#fee2e2;color:#991b1b}
.job-status.paused{background:#fef3db;color:#c78000}

/* ANALYTICS */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.chart-title{font-size:14px;font-weight:700;color:var(--gc-dark);margin-bottom:16px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-row-label{font-size:12px;color:#666;min-width:80px;text-align:right}
.bar-row-bar{flex:1;height:22px;background:#f0f0f0;border-radius:4px;overflow:hidden;position:relative}
.bar-row-fill{height:100%;border-radius:4px;transition:.6s;display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.bar-row-fill span{font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
.bar-row-val{font-size:12px;color:#888;min-width:30px}

/* ADD FORM PANEL */
.add-panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.add-panel-title{font-size:14px;font-weight:700;color:var(--gc-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;cursor:pointer}
.add-panel-body{display:none}
.add-panel.open .add-panel-body{display:block}
.add-panel-toggle{margin-left:auto;transition:.3s}
.add-panel.open .add-panel-toggle{transform:rotate(180deg)}


/* TEAM / CHECK SYSTEM */
.team-section-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 10px}
.member-roster{display:flex;flex-direction:column;gap:8px}
.member-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border);background:#fafafa;transition:.2s}
.member-row.assigned{border-color:var(--gc-light);background:#f0faf5}
.member-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;font-family:monospace}
.member-info{flex:1;min-width:0}
.member-name{font-size:13px;font-weight:600;color:var(--gc-dark)}
.member-role-tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-top:2px}
.role-hr{background:#d1fae5;color:#065f46}
.role-interviewer{background:#dbeafe;color:#1e40af}
.role-manager{background:#ede9fe;color:#5b21b6}
.role-external{background:#fef3db;color:#c78000}
.member-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.assign-toggle{padding:4px 10px;border-radius:6px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:#fff;transition:.2s}
.assign-toggle.assigned{background:var(--gc-pale);border-color:var(--gc-light);color:var(--gc-dark)}
.assign-toggle:hover{border-color:var(--gc-green)}
.check-status-group{display:flex;gap:4px}
.check-btn{padding:3px 8px;border-radius:5px;border:1.5px solid #ddd;font-size:11px;font-weight:700;cursor:pointer;background:#fff;transition:.15s;line-height:1.3}
.check-btn.active-pending{background:#f3f4f6;border-color:#9ca3af;color:#6b7280}
.check-btn.active-checking{background:#fef3db;border-color:#f59e0b;color:#b45309}
.check-btn.active-ok{background:#d1fae5;border-color:#10b981;color:#065f46}
.check-btn.active-ng{background:#fee2e2;border-color:#ef4444;color:#991b1b}
.member-comment-wrap{margin-top:6px}
.member-comment-input{width:100%;padding:5px 8px;font-size:12px;border:1px solid #e5e7eb;border-radius:5px;resize:none;min-height:42px}
/* Kanban reviewer badges */
.card-reviewers{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.reviewer-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default;position:relative;font-family:monospace}
.reviewer-dot[title]:hover::after{content:attr(title);position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;z-index:10;pointer-events:none}
/* Candidate table reviewer chips */
.table-reviewer-chips{display:flex;gap:3px;flex-wrap:wrap}
/* Team settings panel in a floating button area */
.team-mgmt-toggle{position:fixed;bottom:28px;left:24px;background:var(--gc-dark);color:#fff;border:none;padding:10px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:300;transition:.2s}
.team-mgmt-toggle:hover{background:var(--gc-green)}
.team-mgmt-panel{position:fixed;bottom:72px;left:24px;width:320px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:301;display:none;overflow:hidden}
.team-mgmt-panel.open{display:block}
.team-mgmt-header{background:var(--gc-dark);color:#fff;padding:12px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.team-mgmt-body{padding:14px;max-height:400px;overflow-y:auto}
.team-member-edit-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0}
.team-member-edit-row:last-child{border-bottom:none}
.add-member-form{display:flex;flex-direction:column;gap:8px;padding:10px;background:#f8f8f8;border-radius:8px;margin-top:10px}
.add-member-form input,.add-member-form select{padding:6px 10px;border:1.5px solid var(--border);border-radius:5px;font-size:12px}
/* Check summary on kanban col header */
.check-summary-badge{font-size:10px;background:rgba(255,255,255,.25);border-radius:10px;padding:1px 6px;margin-left:4px}

/* RESPONSIVE */
@media(max-width:768px){
  .analytics-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .values-grid{grid-template-columns:1fr}
  .kanban-col{width:175px}
}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--gc-dark);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:9999;transform:translateY(100px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}

/* LOADING */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--gc-green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:#aaa}
.empty-state .icon{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>

<!-- VIEW 1: DASHBOARD -->
<div id="view-dashboard" class="view active">
  <div class="kpi-grid" id="kpiGrid"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
    <div>
      <div class="sec-header"><div class="sec-title" data-i18n="dash.funnel">選考ファネル</div></div>
      <div class="funnel-wrap"><div class="funnel-stages" id="funnelChart"></div></div>
    </div>
    <div>
      <div class="sec-header"><div class="sec-title" data-i18n="dash.dept">部門別採用状況</div></div>
      <div class="dept-table" id="deptTable"></div>
    </div>
  </div>
  <div>
    <div class="sec-header"><div class="sec-title" data-i18n="dash.activity">最近の活動</div></div>
    <div class="activity-log" id="activityLog"></div>
  </div>
</div>

<!-- VIEW 2: KANBAN -->
<div id="view-kanban" class="view">
  <div class="sec-header">
    <div class="sec-title" data-i18n="nav.kanban">カンバンボード</div>
    <div class="sec-actions">
      <button class="btn btn-primary btn-sm" onclick="openAddCandidateModal()">＋ <span data-i18n="btn.addCandidate">候補者追加</span></button>
    </div>
  </div>
  <div class="kanban-wrap" id="kanbanBoard"></div>
</div>

<!-- VIEW 3: CANDIDATES -->
<div id="view-candidates" class="view">
  <div class="sec-header">
    <div class="sec-title" data-i18n="nav.candidates">候補者一覧</div>
    <div class="sec-actions">
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">📥 CSV</button>
      <button class="btn btn-primary btn-sm" onclick="openAddCandidateModal()">＋ <span data-i18n="btn.addCandidate">候補者追加</span></button>
    </div>
  </div>
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 名前・ポジション検索" oninput="filterCandidates()" data-i18n-ph="filter.search">
    <select id="filterStage" onchange="filterCandidates()"><option value="">すべてのステージ</option></select>
    <select id="filterNation" onchange="filterCandidates()"><option value="">すべての国籍</option></select>
    <select id="filterPos" onchange="filterCandidates()"><option value="">すべてのポジション</option></select>
    <select id="filterAssignee" onchange="filterCandidates()"><option value="">すべての担当者</option></select>
  </div>
  <div class="table-wrap">
    <table class="cand-table" id="candTable">
      <thead><tr>
        <th onclick="sortTable('name')">氏名</th>
        <th onclick="sortTable('position')">ポジション</th>
        <th onclick="sortTable('stage')">ステージ</th>
        <th onclick="sortTable('nationality')">国籍</th>
        <th onclick="sortTable('appliedDate')">応募日</th>
        <th onclick="sortTable('assignee')">担当者</th>
        <th onclick="sortTable('days')">経過日数</th>
        <th>レビュアー</th>
      </tr></thead>
      <tbody id="candTableBody"></tbody>
    </table>
  </div>
</div>

<!-- VIEW 4: JOBS -->
<div id="view-jobs" class="view">
  <div class="sec-header">
    <div class="sec-title" data-i18n="nav.jobs">求人管理</div>
  </div>
  <div class="add-panel" id="addJobPanel">
    <div class="add-panel-title" onclick="toggleAddJob()">
      ＋ <span data-i18n="btn.addJob">新規求人を追加</span>
      <span class="add-panel-toggle">▼</span>
    </div>
    <div class="add-panel-body">
      <div class="form-grid">
        <div class="form-group"><label data-i18n="form.jobTitle">ポジション名</label><input id="jTitle" type="text" placeholder="例: ESGアナリスト"></div>
        <div class="form-group"><label data-i18n="form.dept">部門</label><input id="jDept" type="text" placeholder="例: サステナビリティ"></div>
        <div class="form-group"><label data-i18n="form.target">採用目標人数</label><input id="jTarget" type="number" min="1" value="1"></div>
        <div class="form-group"><label data-i18n="form.status">ステータス</label>
          <select id="jStatus"><option value="active">募集中</option><option value="paused">一時停止</option><option value="closed">終了</option></select>
        </div>
        <div class="form-group full"><label data-i18n="form.desc">説明</label><textarea id="jDesc" placeholder="ポジションの説明や要件"></textarea></div>
      </div>
      <div style="margin-top:12px"><button class="btn btn-primary" onclick="saveJob()">保存</button></div>
    </div>
  </div>
  <div class="jobs-grid" id="jobsGrid"></div>
</div>

<!-- VIEW 5: ANALYTICS -->
<div id="view-analytics" class="view">
  <div class="analytics-grid">
    <div class="chart-card">
      <div class="chart-title" data-i18n="analytics.monthly">月別応募数</div>
      <div class="bar-chart" id="monthlyChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title" data-i18n="analytics.channel">チャネル別応募比率</div>
      <div class="bar-chart" id="channelChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title" data-i18n="analytics.nationality">国籍別分布</div>
      <div class="bar-chart" id="natChart"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title" data-i18n="analytics.deptDays">部門別平均選考日数</div>
      <div class="bar-chart" id="deptDaysChart"></div>
    </div>
  </div>
  <div style="margin-top:20px">
    <div class="chart-card">
      <div class="chart-title" data-i18n="analytics.acceptance">内定承諾率トレンド（月別）</div>
      <div class="bar-chart" id="acceptChart"></div>
    </div>
  </div>
</div>

<!-- CANDIDATE DETAIL MODAL -->
<div class="modal-backdrop" id="candModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 id="modalName">候補者名</h2>
        <div style="font-size:12px;opacity:.8" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal('candModal')">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchModalTab('basic')" data-i18n="modal.basic">基本情報</button>
      <button class="modal-tab" onclick="switchModalTab('eval')" data-i18n="modal.eval">評価</button>
      <button class="modal-tab" onclick="switchModalTab('interview')" data-i18n="modal.interview">面接記録</button>
      <button class="modal-tab" onclick="switchModalTab('memo')" data-i18n="modal.memo">メモ</button>
      <button class="modal-tab" onclick="switchModalTab('team')" data-i18n="modal.team">チーム</button>
    </div>
    <div class="modal-body">
      <!-- Basic Tab -->
      <div class="modal-tab-pane active" id="pane-basic">
        <div class="form-grid" id="basicFormGrid"></div>
      </div>
      <!-- Eval Tab -->
      <div class="modal-tab-pane" id="pane-eval">
        <div class="values-grid" id="valuesGrid"></div>
        <div style="margin-top:16px;padding:14px;background:#fafafa;border-radius:8px">
          <div class="form-grid" style="grid-template-columns:1fr 1fr">
            <div class="form-group"><label data-i18n="eval.evaluator">評価者</label><input id="evalEvaluator" type="text"></div>
            <div class="form-group"><label data-i18n="eval.date">評価日</label><input id="evalDate" type="date"></div>
          </div>
        </div>
      </div>
      <!-- Interview Tab -->
      <div class="modal-tab-pane" id="pane-interview">
        <div id="interviewList" class="interview-list"></div>
        <div style="margin-top:16px;background:#f8f8f8;border-radius:8px;padding:14px">
          <div style="font-size:13px;font-weight:700;margin-bottom:10px" data-i18n="interview.add">面接記録を追加</div>
          <div class="form-grid">
            <div class="form-group"><label data-i18n="interview.date">日付</label><input id="ivDate" type="date"></div>
            <div class="form-group"><label data-i18n="interview.interviewer">面接官</label><input id="ivInterviewer" type="text"></div>
            <div class="form-group"><label data-i18n="interview.verdict">判定</label>
              <select id="ivVerdict">
                <option value="pass" data-i18n="verdict.pass">通過</option>
                <option value="hold" data-i18n="verdict.hold">保留</option>
                <option value="fail" data-i18n="verdict.fail">不採用</option>
              </select>
            </div>
            <div class="form-group full"><label data-i18n="interview.feedback">フィードバック</label><textarea id="ivFeedback" rows="3"></textarea></div>
          </div>
          <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="addInterview()">追加</button>
        </div>
      </div>
      <!-- Memo Tab -->
      <div class="modal-tab-pane" id="pane-memo">
        <div id="memoTimeline" class="memo-timeline"></div>
        <div class="add-memo-form">
          <textarea id="newMemoText" placeholder="メモを入力..."></textarea>
          <button class="btn btn-primary" onclick="addMemo()">追加</button>
        </div>
      </div>
      <!-- Team / Check Tab -->
      <div class="modal-tab-pane" id="pane-team">
        <div class="team-section-title">担当者・レビュアー管理</div>
        <div id="teamRosterWrap"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('candModal')" data-i18n="btn.cancel">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCandidate()" data-i18n="btn.save">保存</button>
    </div>
  </div>
</div>

<!-- ADD CANDIDATE MODAL -->
<div class="modal-backdrop" id="addCandModal">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h2 data-i18n="modal.addCandidate">候補者を追加</h2>
      <button class="modal-close" onclick="closeModal('addCandModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label data-i18n="form.name">氏名</label><input id="acName" type="text" required></div>
        <div class="form-group"><label data-i18n="form.nationality">国籍</label>
          <select id="acNation">
            <option value="🇯🇵 日本">🇯🇵 日本</option>
            <option value="🇮🇩 インドネシア">🇮🇩 インドネシア</option>
            <option value="🇻🇳 ベトナム">🇻🇳 ベトナム</option>
            <option value="🇵🇭 フィリピン">🇵🇭 フィリピン</option>
            <option value="🇹🇭 タイ">🇹🇭 タイ</option>
            <option value="🇲🇾 マレーシア">🇲🇾 マレーシア</option>
            <option value="🇸🇬 シンガポール">🇸🇬 シンガポール</option>
            <option value="🇺🇸 アメリカ">🇺🇸 アメリカ</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="form-group full"><label data-i18n="form.position">ポジション</label><input id="acPosition" type="text"></div>
        <div class="form-group"><label data-i18n="form.stage">ステージ</label>
          <select id="acStage">
            <option value="applied">応募</option><option value="screening">書類審査</option>
            <option value="first">一次面接</option><option value="second">二次面接</option>
            <option value="final">最終面接</option><option value="offer">内定</option>
            <option value="accepted">承諾</option>
          </select>
        </div>
        <div class="form-group"><label data-i18n="form.priority">優先度</label>
          <select id="acPriority"><option value="high">高</option><option value="mid" selected>中</option><option value="low">低</option></select>
        </div>
        <div class="form-group"><label data-i18n="form.assignee">担当者</label>
          <select id="acAssignee">
            <option>田中 太郎</option><option>Siti Rahayu</option><option>Nguyen Thi Lan</option>
            <option>山田 花子</option><option>John Smith</option>
          </select>
        </div>
        <div class="form-group"><label data-i18n="form.channel">応募経路</label>
          <select id="acChannel">
            <option>Wantedly</option><option>Indeed</option><option>LinkedIn</option>
            <option>リファラル</option><option>エージェント</option><option>自社サイト</option><option>その他</option>
          </select>
        </div>
        <div class="form-group"><label data-i18n="form.email">メール</label><input id="acEmail" type="email"></div>
        <div class="form-group"><label data-i18n="form.appliedDate">応募日</label><input id="acApplied" type="date"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addCandModal')" data-i18n="btn.cancel">キャンセル</button>
      <button class="btn btn-primary" onclick="createCandidate()" data-i18n="btn.add">追加</button>
    </div>
  </div>
</div>

<!-- TEAM MANAGEMENT PANEL -->
<button class="team-mgmt-toggle" onclick="toggleTeamPanel()">👥 メンバー管理</button>
<div class="team-mgmt-panel" id="teamMgmtPanel">
  <div class="team-mgmt-header">
    <span>チームメンバー管理</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="syncTeamToGAS()" style="background:rgba(255,255,255,.2);border:none;color:#fff;cursor:pointer;font-size:11px;padding:3px 8px;border-radius:5px;font-weight:600">☁️ 同期</button>
      <button onclick="toggleTeamPanel()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:16px">✕</button>
    </div>
  </div>
  <div class="team-mgmt-body">
    <div id="memberEditList"></div>
    <div class="add-member-form">
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:4px">＋ メンバーを追加</div>
      <input id="newMemberName" type="text" placeholder="氏名">
      <input id="newMemberEmail" type="email" placeholder="メールアドレス（任意）">
      <select id="newMemberRole">
        <option value="hr">人事担当 (HR)</option>
        <option value="interviewer">面接官</option>
        <option value="manager">採用マネージャー</option>
        <option value="external">外部レビュアー</option>
      </select>
      <input id="newMemberInitial" type="text" placeholder="イニシャル（例: 田、S）" maxlength="2">
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick="addTeamMember()" style="flex:1">追加</button>
        <button class="btn btn-sm" onclick="addAndInvite()" style="flex:1;background:#10b981;color:#fff;border:none" title="追加してツールURLを招待メールで送信">✉️ 追加＋招待</button>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:14px;color:var(--gc-dark)">GASと同期中...</div>
</div>
<div class="toast" id="toast"></div>

let currentLang = 'ja';
function t(k){ return (i18n[currentLang]||i18n.ja)[k] || k; }
function setLang(lang){
  currentLang = lang;
  document.getElementById('langJa').className = lang==='ja'?'active':'';
  document.getElementById('langEn').className = lang==='en'?'active':'';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k = el.getAttribute('data-i18n'); if(t(k)!==k) el.textContent = t(k);
  });
  renderAll();
}

  {id:'offer',     ja:'内定',    en:'Offer',        color:'#457b9d'},
  {id:'accepted',  ja:'承諾',    en:'Accepted',     color:'#1d3557'},

// ===================== GAS / STORAGE =====================
async function loadData(){
  showLoading(true);
  try {
    const [cr, jr, tr] = await Promise.all([
      fetch(GAS_URL+'?action=getCandidates').then(r=>r.json()),
      fetch(GAS_URL+'?action=getJobs').then(r=>r.json()),
      fetch(GAS_URL+'?action=getTeamMembers').then(r=>r.json())
    ]);
    candidates = Array.isArray(cr) ? cr : sampleCandidates;
    jobs = Array.isArray(jr) ? jr : sampleJobs;
    if(Array.isArray(tr) && tr.length) {
      teamMembers = tr;
      localStorage.setItem(LS_TEAM, JSON.stringify(teamMembers));
    }
    localStorage.setItem(LS_CAND, JSON.stringify(candidates));
    localStorage.setItem(LS_JOBS, JSON.stringify(jobs));
    setSync(true);
    toast('☁️ GASから最新データを取得しました');
  } catch(e){
    const lc = localStorage.getItem(LS_CAND);
    const lj = localStorage.getItem(LS_JOBS);
    candidates = lc ? JSON.parse(lc) : sampleCandidates;
    jobs = lj ? JSON.parse(lj) : sampleJobs;
    // teamMembers はLS_TEAMから（上部で既に初期化済み）
    setSync(false);
  }
  showLoading(false);
  renderAll();
}

async function saveData(){
  localStorage.setItem(LS_CAND, JSON.stringify(candidates));
  localStorage.setItem(LS_JOBS, JSON.stringify(jobs));
  if(gasConnected){
    try{
      await fetch(GAS_URL, {method:'POST',body:JSON.stringify({action:'saveCandidates',data:candidates})});
    }catch(e){ setSync(false); }
  }
}

async function syncTeamToGAS(){
  localStorage.setItem(LS_TEAM, JSON.stringify(teamMembers));
  if(!gasConnected) return;
  try{
    await fetch(GAS_URL, {method:'POST',body:JSON.stringify({action:'saveTeamMembers',data:teamMembers})});
    toast('☁️ メンバーリストをGASに保存しました');
  }catch(e){
    toast('💾 ローカルに保存しました（GAS接続エラー）');
    setSync(false);
  }
}

function setSync(ok){
  gasConnected = ok;
  const b = document.getElementById('syncBadge');
  const i = document.getElementById('syncIcon');
  const tx = document.getElementById('syncText');
  b.className = 'sync-badge '+(ok?'synced':'local');
  i.textContent = ok?'☁️':'💾';
  tx.textContent = ok ? t('sync.gas') : t('sync.local');
}
function showLoading(show){ document.getElementById('loadingOverlay').className='loading-overlay'+(show?' show':''); }
function toast(msg, dur=2500){
  const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show';
  setTimeout(()=>el.className='toast',dur);
}

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`.nav-btn[data-view="${name}"]`).classList.add('active');
  if(name==='kanban') renderKanban();
  if(name==='analytics') renderAnalytics();
}

// ===================== DASHBOARD =====================
function renderDashboard(){
  const active = candidates.filter(c=>!['rejected','accepted'].includes(c.stage));
  const accepted = candidates.filter(c=>c.stage==='accepted');
  const thisMonth = new Date(); thisMonth.setDate(1);
  const interviews = candidates.filter(c=>['first','second','final'].includes(c.stage)).length;
  const avgDays = candidates.length ? Math.round(candidates.reduce((s,c)=>s+daysSince(c.appliedDate),0)/candidates.length) : 0;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">${t('kpi.inProgress')}</div><div class="kpi-value">${active.length}</div><div class="kpi-sub">全${candidates.length}名中</div></div>
    <div class="kpi-card orange"><div class="kpi-label">${t('kpi.accepted')}</div><div class="kpi-value">${accepted.length}</div><div class="kpi-sub">承諾率 ${candidates.filter(c=>c.stage==='offer'||c.stage==='accepted').length?Math.round(accepted.length/candidates.filter(c=>c.stage==='offer'||c.stage==='accepted').length*100):0}%</div></div>
    <div class="kpi-card blue"><div class="kpi-label">${t('kpi.interviews')}</div><div class="kpi-value">${interviews}</div><div class="kpi-sub">面接ステージ</div></div>
    <div class="kpi-card red"><div class="kpi-label">${t('kpi.avgDays')}</div><div class="kpi-value">${avgDays}</div><div class="kpi-sub">日</div></div>
  `;

  // Funnel
  const funnelData = STAGES.filter(s=>s.id!=='rejected').map(s=>({...s,count:candidates.filter(c=>c.stage===s.id).length}));
  const maxCount = Math.max(...funnelData.map(f=>f.count),1);
  document.getElementById('funnelChart').innerHTML = funnelData.map(f=>`
    <div class="funnel-stage">
      <div class="funnel-bar-wrap">
        <div class="funnel-bar" style="background:${f.color};height:${Math.max(f.count/maxCount*110,6)}px">
          <span class="bar-label">${f.count}</span>
        </div>
      </div>
      <div class="funnel-stage-name">${currentLang==='ja'?f.ja:f.en}</div>
    </div>`).join('');

  // Dept table
  const depts = {};
  candidates.forEach(c=>{ if(!depts[c.dept]) depts[c.dept]={active:0,accepted:0,total:0}; depts[c.dept].total++; if(c.stage==='accepted') depts[c.dept].accepted++; else if(!['rejected'].includes(c.stage)) depts[c.dept].active++; });
  const jobMap = {};
  jobs.forEach(j=>{ jobMap[j.dept]=(jobMap[j.dept]||0)+j.target; });
  document.getElementById('deptTable').innerHTML = `<table><thead><tr><th>部門</th><th>選考中</th><th>内定承諾</th><th>目標</th><th>進捗</th></tr></thead><tbody>${Object.entries(depts).map(([dept,d])=>{const target=jobMap[dept]||1;const pct=Math.min(Math.round(d.accepted/target*100),100);return `<tr><td>${dept}</td><td>${d.active}</td><td>${d.accepted}</td><td>${target}</td><td><div class="progress-bar" style="width:100px"><div class="progress-fill" style="width:${pct}%"></div></div></td></tr>`}).join('')}</tbody></table>`;

  // Activity
  const recent = [...candidates].sort((a,b)=>new Date(b.activityDate)-new Date(a.activityDate)).slice(0,10);
  document.getElementById('activityLog').innerHTML = recent.map(c=>`
    <div class="activity-item">
      <div class="activity-dot"></div>
      <div class="activity-text"><strong>${c.name}</strong>（${c.nationality.split(' ')[1]||c.nationality}）が<strong>${stageName(c.stage)}</strong>ステージに</div>
      <div class="activity-time">${formatDate(c.activityDate)}</div>
    </div>`).join('') || '<div class="empty-state"><div class="icon">📭</div>活動なし</div>';
}

// ===================== KANBAN =====================
function renderKanban(){
  const board = document.getElementById('kanbanBoard');
  board.innerHTML = STAGES.map(stage=>`
    <div class="kanban-col col-${stage.id}" data-stage="${stage.id}">
      <div class="kanban-col-header">
        <span>${currentLang==='ja'?stage.ja:stage.en}</span>
        <span class="kanban-count">${candidates.filter(c=>c.stage===stage.id).length}</span>
      </div>
      <div class="kanban-cards" id="col-${stage.id}"
        ondragover="onDragOver(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event,'${stage.id}')">
        ${candidates.filter(c=>c.stage===stage.id).map(c=>kanbanCard(c)).join('')}
      </div>
    </div>`).join('');
}

function kanbanCard(c){
  const days = daysSince(c.appliedDate);
  return `<div class="kanban-card priority-${c.priority||'mid'}" draggable="true"
    id="card-${c.id}"
    ondragstart="onDragStart(event,'${c.id}')"
    ondragend="onDragEnd(event)"
    onclick="openCandidateModal('${c.id}')">
    <div class="card-name">${c.name}</div>
    <div class="card-pos">${c.position}</div>
    <div class="card-meta">
      <span class="card-flag">${c.nationality.split(' ')[0]}</span>
      <span class="card-days">${days}日</span>
      <span class="priority-badge ${c.priority||'mid'}">${c.priority==='high'?'高':c.priority==='low'?'低':'中'}</span>
    </div>
    ${reviewerDots(c)}
  </div>`;
}

function onDragStart(e,id){ dragItem=id; e.target.classList.add('dragging'); }
function onDragEnd(e){ e.target.classList.remove('dragging'); dragItem=null; document.querySelectorAll('.kanban-cards').forEach(c=>c.classList.remove('drag-over')); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function onDrop(e,stageId){
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!dragItem) return;
  const cand = candidates.find(c=>c.id===dragItem);
  if(cand){ cand.stage=stageId; cand.activityDate=new Date().toISOString().split('T')[0]; saveData(); renderKanban(); renderDashboard(); toast(`${cand.name} → ${stageName(stageId)}`); }
}

function filterCandidates(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const stage = document.getElementById('filterStage').value;
  const nation = document.getElementById('filterNation').value;
  const pos = document.getElementById('filterPos').value;
  const assignee = document.getElementById('filterAssignee').value;
  const filtered = candidates.filter(c=>{
    if(q && !c.name.toLowerCase().includes(q) && !c.position.toLowerCase().includes(q)) return false;
    if(stage && c.stage!==stage) return false;
    if(nation && c.nationality!==nation) return false;
    if(pos && c.position!==pos) return false;
    if(assignee && c.assignee!==assignee) return false;
    return true;
  });
  renderCandidateTable(filtered);
}

function sortTable(field){
  if(sortField===field) sortAsc=!sortAsc; else{ sortField=field; sortAsc=true; }
  filterCandidates();
}

function renderCandidates(){
  renderCandidateTable(candidates);
  populateFilters();
}

function renderCandidateTable(data){
  const sorted = [...data].sort((a,b)=>{
    let av=a[sortField]||'', bv=b[sortField]||'';
    if(sortField==='days'){ av=daysSince(a.appliedDate); bv=daysSince(b.appliedDate); }
    if(typeof av==='string') av=av.toLowerCase(); if(typeof bv==='string') bv=bv.toLowerCase();
    return sortAsc ? (av>bv?1:-1) : (av<bv?1:-1);
  });
  document.getElementById('candTableBody').innerHTML = sorted.map(c=>`
    <tr onclick="openCandidateModal('${c.id}')">
      <td><strong>${c.name}</strong></td>
      <td>${c.position}</td>
      <td><span class="stage-chip stage-${c.stage}">${stageName(c.stage)}</span></td>
      <td>${c.nationality}</td>
      <td>${formatDate(c.appliedDate)}</td>
      <td>${c.assignee}</td>
      <td>${daysSince(c.appliedDate)}日</td>
    </tr>`).join('') || `<tr><td colspan="7" style="text-align:center;padding:40px;color:#aaa">該当候補者なし</td></tr>`;
}

function exportCSV(){
  const headers = ['ID','氏名','国籍','ポジション','ステージ','応募日','担当者','チャネル','経過日数'];
  const rows = candidates.map(c=>[c.id,c.name,c.nationality,c.position,stageName(c.stage),c.appliedDate,c.assignee,c.channel,daysSince(c.appliedDate)]);
  const csv = [headers,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv); a.download='gc_candidates.csv'; a.click();
  toast('CSVをダウンロードしました');
}

// ===================== ANALYTICS =====================
function renderAnalytics(){
  // Monthly apps (last 6 months)
  const monthly = {};
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const key=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
    monthly[key]=0;
  }
  candidates.forEach(c=>{ const d=new Date(c.appliedDate); const key=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`; if(key in monthly) monthly[key]++; });
  renderBarChart('monthlyChart', Object.entries(monthly), '#40916c', 25);

  // Channel
  const channels = {};
  candidates.forEach(c=>channels[c.channel]=(channels[c.channel]||0)+1);
  renderBarChart('channelChart', Object.entries(channels).sort((a,b)=>b[1]-a[1]), '#457b9d', 35);

  // Nationality
  const nats = {};
  candidates.forEach(c=>{ const n=c.nationality.split(' ').slice(1).join(' ')||c.nationality; nats[n]=(nats[n]||0)+1; });
  renderBarChart('natChart', Object.entries(nats).sort((a,b)=>b[1]-a[1]), '#52b788', 35);

  // Dept avg days
  const deptDays = {};
  candidates.forEach(c=>{ if(!deptDays[c.dept]) deptDays[c.dept]=[]; deptDays[c.dept].push(daysSince(c.appliedDate)); });
  const deptAvg = Object.entries(deptDays).map(([d,arr])=>[d, Math.round(arr.reduce((s,v)=>s+v,0)/arr.length)]).sort((a,b)=>b[1]-a[1]);
  renderBarChart('deptDaysChart', deptAvg, '#f4a261', 40);

  // Acceptance rate by month
  const acceptData = {};
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const key=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
    acceptData[key]={offers:0,accepted:0};
  }
  candidates.filter(c=>['offer','accepted'].includes(c.stage)).forEach(c=>{
    const d=new Date(c.appliedDate); const key=`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}`;
    if(key in acceptData){ acceptData[key].offers++; if(c.stage==='accepted') acceptData[key].accepted++; }
  });
  const acceptEntries = Object.entries(acceptData).map(([k,v])=>[k, v.offers>0?Math.round(v.accepted/v.offers*100):0]);
  renderBarChart('acceptChart', acceptEntries, '#1b4332', 100);
}

function renderBarChart(containerId, data, color, maxOverride=null){
  const max = maxOverride || Math.max(...data.map(d=>d[1]),1);
  document.getElementById(containerId).innerHTML = data.map(([label,val])=>`
    <div class="bar-row">
      <div class="bar-row-label">${label}</div>
      <div class="bar-row-bar">
        <div class="bar-row-fill" style="width:${Math.max(val/max*100,2)}%;background:${color}">
          ${val>0?`<span>${val}${containerId==='acceptChart'?'%':''}</span>`:''}
        </div>
      </div>
      <div class="bar-row-val">${val}${containerId==='acceptChart'?'%':''}</div>
    </div>`).join('');
}

function daysSince(dateStr){ if(!dateStr) return 0; return Math.floor((new Date()-new Date(dateStr))/(1000*60*60*24)); }
function formatDate(d){ if(!d) return '-'; const dt=new Date(d); return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`; }

async function sendInviteEmail(name, email, role){
  const toolUrl = location.href.split('?')[0];
  const roleLabel = {hr:'人事担当', interviewer:'面接官', manager:'採用マネージャー', external:'外部レビュアー'}[role]||role;
  showLoading();
  try {
    const res = await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({action:'sendInvite', data:{name, email, role, roleLabel, toolUrl}})
    });
    const json = await res.json();
    if(json.ok){ toast(`✉️ ${name}さん（${email}）に招待メールを送りました`); }
    else { toast('⚠️ 送信失敗: '+(json.error||'不明'), true); }
  } catch(e){ toast('⚠️ 送信エラー: '+e.message, true); }
  finally { hideLoading(); }
}

function removeTeamMember(id){
  if(!confirm('このメンバーを削除しますか？')) return;
  teamMembers = teamMembers.filter(m=>m.id!==id);
  syncTeamToGAS();
  renderTeamMgmtPanel();
  toast('メンバーを削除しました');
}

function toggleTeamPanel(){
  const p = document.getElementById('teamMgmtPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) renderTeamMgmtPanel();
}

function renderTeamMgmtPanel(){
  document.getElementById('memberEditList').innerHTML = teamMembers.map(m=>`
    <div class="team-member-edit-row">
      <div class="member-avatar" style="background:${m.color};width:28px;height:28px;font-size:10px">${m.initial}</div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:600">${m.name}</div>
        <span class="member-role-tag role-${m.role}">${ROLE_LABELS[m.role]}</span>
      </div>
      <button onclick="removeTeamMember('${m.id}')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:2px 6px" title="削除">✕</button>
    </div>`).join('');
}

// ── Team Tab in Candidate Modal ──
function renderTeamTab(c){
  if(!c.reviewers) c.reviewers = [];
  const wrap = document.getElementById('teamRosterWrap');
  if(!wrap) return;

  // Group members by role
  const grouped = {};
  teamMembers.forEach(m=>{ if(!grouped[m.role]) grouped[m.role]=[]; grouped[m.role].push(m); });

  let html = '';
  const roleOrder = ['hr','manager','interviewer','external'];
  roleOrder.forEach(role=>{
    if(!grouped[role]) return;
    html += `<div class="team-section-title">${role==='hr'?'人事担当':role==='manager'?'採用マネージャー':role==='interviewer'?'面接官':'外部レビュアー'}</div>
    <div class="member-roster">`;
    grouped[role].forEach(m=>{
      const rv = c.reviewers.find(r=>r.memberId===m.id);
      const isAssigned = !!rv;
      const status = rv?.status||'pending';
      const comment = rv?.comment||'';
      html += `
      <div class="member-row ${isAssigned?'assigned':''}" id="mrow-${m.id}">
        <div class="member-avatar" style="background:${m.color}">${m.initial}</div>
        <div class="member-info">
          <div class="member-name">${m.name}</div>
          <span class="member-role-tag role-${m.role}">${ROLE_LABELS[m.role]}</span>
          ${isAssigned?`<div class="member-comment-wrap">
            <textarea class="member-comment-input" id="mc-${m.id}" onchange="updateReviewerComment('${m.id}',this.value)" placeholder="コメント（任意）">${esc(comment)}</textarea>
          </div>`:''}
        </div>
        <div class="member-actions">
          ${isAssigned?`
          <div class="check-status-group">
            ${[['pending','未確認'],['checking','確認中'],['ok','OK'],['ng','NG']].map(([s,l])=>`
            <button class="check-btn ${status===s?'active-'+s:''}" onclick="setReviewStatus('${m.id}','${s}')" title="${l}">${l}</button>`).join('')}
          </div>`:''}
          <button class="assign-toggle ${isAssigned?'assigned':''}" onclick="toggleAssign('${m.id}')">
            ${isAssigned?'担当中 ✓':'担当追加'}
          </button>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  wrap.innerHTML = html;
}

function toggleAssign(memberId){
  const c = candidates.find(x=>x.id===currentEditId); if(!c) return;
  if(!c.reviewers) c.reviewers=[];
  const idx = c.reviewers.findIndex(r=>r.memberId===memberId);
  if(idx>=0){
    c.reviewers.splice(idx,1);
  } else {
    const m = teamMembers.find(x=>x.id===memberId);
    c.reviewers.push({memberId, status:'pending', comment:'', assignedDate:new Date().toISOString().split('T')[0], role:m?.role||'interviewer'});
  }
  renderTeamTab(c);
}

function setReviewStatus(memberId, status){
  const c = candidates.find(x=>x.id===currentEditId); if(!c||!c.reviewers) return;
  const rv = c.reviewers.find(r=>r.memberId===memberId);
  if(rv){ rv.status=status; rv.checkedDate=new Date().toISOString().split('T')[0]; }
  renderTeamTab(c);
  const m = teamMembers.find(x=>x.id===memberId);
  const label = status==='ok'?'OK ✓':status==='ng'?'NG ✗':status==='checking'?'確認中':'未確認';
  toast(`${m?.name||memberId}: ${label}`);
}

function updateReviewerComment(memberId, value){
  const c = candidates.find(x=>x.id===currentEditId); if(!c||!c.reviewers) return;
  const rv = c.reviewers.find(r=>r.memberId===memberId);
  if(rv) rv.comment=value;
}

// Reviewer dots for kanban card
function reviewerDots(c){
  if(!c.reviewers||!c.reviewers.length) return '';
  const dots = c.reviewers.map(rv=>{
    const m = teamMembers.find(x=>x.id===rv.memberId);
    if(!m) return '';
    const statusColor = {pending:'#9ca3af',checking:'#f59e0b',ok:'#10b981',ng:'#ef4444'}[rv.status]||'#9ca3af';
    return `<div class="reviewer-dot" style="background:${statusColor}" title="${m.name}（${rv.status==='ok'?'OK':rv.status==='ng'?'NG':rv.status==='checking'?'確認中':'未確認'}）">${m.initial}</div>`;
  }).join('');
  return `<div class="card-reviewers">${dots}</div>`;
}

// Check summary for reviewer chips in table
function reviewerChips(c){
  if(!c.reviewers||!c.reviewers.length) return '<span style="color:#ccc;font-size:11px">—</span>';
  return `<div class="table-reviewer-chips">${c.reviewers.map(rv=>{
    const m = teamMembers.find(x=>x.id===rv.memberId);
    if(!m) return '';
    const statusColor = {pending:'#9ca3af',checking:'#f59e0b',ok:'#10b981',ng:'#ef4444'}[rv.status]||'#9ca3af';
    const label = rv.status==='ok'?'OK':rv.status==='ng'?'NG':rv.status==='checking'?'中':'—';
    return `<div class="reviewer-dot" style="background:${statusColor};width:24px;height:24px;font-size:9px" title="${m.name}: ${label}">${m.initial}</div>`;
  }).join('')}</div>`;
}

// ===================== INIT =====================
window.addEventListener('load', loadData);
</script>

function doGet(e) {
  const action = e.parameter.action;
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  if (action === 'getCandidates') {
    const sheet = ss.getSheetByName('Candidates') || ss.insertSheet('Candidates');
    const data = sheet.getDataRange().getValues();
    if (data.length < 2) return ContentService.createTextOutput(JSON.stringify([])).setMimeType(ContentService.MimeType.JSON);
    const headers = data[0];
    const rows = data.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = row[i]);
      // Parse JSON fields
      ['evaluations','interviews','memos'].forEach(f => { try { if(obj[f]) obj[f] = JSON.parse(obj[f]); } catch(e){} });
      return obj;
    });
    return ContentService.createTextOutput(JSON.stringify(rows)).setMimeType(ContentService.MimeType.JSON);
  }
  
  if (action === 'getJobs') {
    const sheet = ss.getSheetByName('Jobs') || ss.insertSheet('Jobs');
    const data = sheet.getDataRange().getValues();
    if (data.length < 2) return ContentService.createTextOutput(JSON.stringify([])).setMimeType(ContentService.MimeType.JSON);
    const headers = data[0];
    const rows = data.slice(1).map(row => { const obj={}; headers.forEach((h,i)=>obj[h]=row[i]); return obj; });
    return ContentService.createTextOutput(JSON.stringify(rows)).setMimeType(ContentService.MimeType.JSON);
  }
  
  return ContentService.createTextOutput(JSON.stringify({error:'Unknown action'})).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  const body = JSON.parse(e.postData.contents);
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  
  if (body.action === 'saveCandidates') {
    const sheet = ss.getSheetByName('Candidates') || ss.insertSheet('Candidates');
    sheet.clearContents();
    const candidates = body.data;
    if (!candidates || !candidates.length) return ContentService.createTextOutput('{}').setMimeType(ContentService.MimeType.JSON);
    const keys = ['id','name','nationality','position','stage','priority','assignee','channel','email','appliedDate','dept','evaluations','interviews','memos','activityDate','evaluator','evalDate'];
    sheet.appendRow(keys);
    candidates.forEach(c => {
      sheet.appendRow(keys.map(k => {
        const v = c[k];
        return (typeof v === 'object') ? JSON.stringify(v) : (v || '');
      }));
    });
    return ContentService.createTextOutput(JSON.stringify({ok:true})).setMimeType(ContentService.MimeType.JSON);
  }
  
  if (body.action === 'saveJob') {
    const sheet = ss.getSheetByName('Jobs') || ss.insertSheet('Jobs');
    const job = body.data;
    const keys = ['id','title','dept','target','status','desc'];
    if (sheet.getLastRow() === 0) sheet.appendRow(keys);
    sheet.appendRow(keys.map(k => job[k] || ''));
    return ContentService.createTextOutput(JSON.stringify({ok:true})).setMimeType(ContentService.MimeType.JSON);
  }
  
  return ContentService.createTextOutput(JSON.stringify({error:'Unknown action'})).setMimeType(ContentService.MimeType.JSON);
}
