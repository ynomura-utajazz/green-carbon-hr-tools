name: Supabase keep-alive

# Supabase 無料プランは 7 日間 DB リクエストが無いと自動一時停止し、
# 一度停止すると DNS ごと消えてログインできなくなる（手動 Resume が必要）。
# Vercel Cron は無料プランだと 1 日 1 回までで、連休など長い空白があると
# 停止条件に達してしまう。そこで GitHub Actions から 6 時間おきに
# 認証不要の keep-alive エンドポイントを叩き、非アクティブ判定をリセットする。
#
# - エンドポイント: /api/cron/keepalive（service role で organizations を 1 行 SELECT）
# - シークレット不要（公開エンドポイントを GET するだけ）
# - 手動実行も可能（workflow_dispatch）
#
# 注意: スケジュール実行はデフォルトブランチ（main）上のこのファイルだけが対象。
#       また GitHub はリポジトリが 60 日間無操作だとスケジュールを自動停止する。

on:
  schedule:
    # 毎 6 時間（UTC 0/6/12/18 時）。1 日 4 回叩けば 7 日の停止条件には十分な余裕。
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping keep-alive endpoint
        run: |
          set -euo pipefail
          URL="https://green-carbon-hr-tools.vercel.app/api/cron/keepalive"

          # 停止直後は起動に時間がかかるため、最大 5 回リトライ（間隔 20 秒）。
          for attempt in 1 2 3 4 5; do
            body="$(curl -sS -L -m 30 "$URL" || true)"
            echo "[attempt $attempt] $body"
            if printf '%s' "$body" | grep -q '"ok":true'; then
              echo "Supabase is alive."
              exit 0
            fi
            sleep 20
          done

          echo "::error::keep-alive did not return ok:true after 5 attempts. Supabase may be paused — check the dashboard and Resume manually."
          exit 1
