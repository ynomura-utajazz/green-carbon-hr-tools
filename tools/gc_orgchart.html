<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組織図 | Green Carbon</title>
<style>
  :root {
    --gc-green: #2d6a4f; --gc-light: #52b788; --gc-pale: #d8f3dc;
    --gc-dark: #1b4332; --bg: #f8fffe; --border: #b7e4c7; --text: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--gc-dark); color: white; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  header .logo { font-size: 20px; font-weight: 700; }
  header .subtitle { font-size: 14px; opacity: 0.8; }
  header a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; margin-left: auto; }

  .toolbar { padding: 16px 24px; background: white; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .toolbar-stats { font-size: 14px; color: #666; }
  .toolbar-stats strong { color: var(--gc-dark); }
  .btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .btn-secondary { background: white; color: var(--gc-green); border: 1.5px solid var(--gc-green); }
  .btn-secondary:hover { background: var(--gc-pale); }
  .btn-active { background: var(--gc-green); color: white; border: 1.5px solid var(--gc-green); }

  .chart-wrapper { padding: 32px 24px; overflow: auto; min-height: calc(100vh - 120px); }

  /* ── Tree View ── */
  .tree-view { display: flex; flex-direction: column; align-items: center; gap: 0; }

  /* CEO node */
  .ceo-node { background: var(--gc-dark); color: white; border-radius: 16px; padding: 18px 28px; text-align: center; min-width: 200px; box-shadow: 0 4px 16px rgba(27,67,50,0.3); }
  .ceo-node .n-avatar { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.2); color: white; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; margin: 0 auto 10px; }
  .ceo-node .n-name { font-size: 16px; font-weight: 700; }
  .ceo-node .n-role { font-size: 12px; opacity: 0.75; margin-top: 3px; }

  /* Connector lines */
  .v-line { width: 2px; height: 32px; background: var(--border); margin: 0 auto; }
  .h-connector { position: relative; display: flex; align-items: flex-start; justify-content: center; }
  .h-connector::before { content:''; position:absolute; top:0; left:10%; right:10%; height:2px; background:var(--border); }

  /* Director row */
  .director-row { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; }
  .director-node { background: white; border: 2.5px solid var(--gc-dark); border-radius: 12px; padding: 14px 18px; min-width: 150px; max-width: 180px; text-align: center; }
  .director-node .n-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gc-dark); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; margin: 0 auto 8px; }
  .director-node .n-name { font-size: 14px; font-weight: 600; }
  .director-node .n-role { font-size: 11px; color: #888; margin-top: 3px; }
  .director-node .n-dept { font-size: 10px; padding: 2px 8px; background: var(--gc-pale); color: var(--gc-dark); border-radius: 8px; margin-top: 6px; display: inline-block; }

  /* Department grid */
  .dept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; width: 100%; max-width: 1100px; }
  .dept-card { background: white; border: 2px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
  .dept-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .dept-card-header { background: var(--gc-green); color: white; padding: 12px 16px; }
  .dept-card-header .d-name { font-size: 14px; font-weight: 600; }
  .dept-card-header .d-count { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .dept-card-body { padding: 12px 16px; }
  .dept-card-body .d-leader { font-size: 13px; font-weight: 500; color: var(--gc-dark); }
  .dept-card-body .d-leader-role { font-size: 11px; color: #888; }
  .dept-card-body .d-members { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .d-chip { font-size: 11px; padding: 2px 8px; background: var(--gc-pale); border-radius: 8px; color: var(--gc-dark); }

  /* ── Dept List View ── */
  .dept-list-view { display: none; }
  .dept-section { background: white; border-radius: 12px; border: 2px solid var(--border); margin-bottom: 20px; overflow: hidden; }
  .dept-section-header { background: var(--gc-green); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
  .dept-section-header h3 { font-size: 16px; font-weight: 600; }
  .dept-section-header .dc { font-size: 13px; opacity: 0.8; }
  .dept-members { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .member-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
  .member-avatar { width: 34px; height: 34px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .member-info .m-name { font-size: 13px; font-weight: 500; }
  .member-info .m-role { font-size: 11px; color: #888; }

  /* Profile modal */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal-panel { background:white; border-radius:16px; padding:0; max-width:380px; width:90%; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.2); }
  .mp-header { background:var(--gc-dark); color:white; padding:24px; text-align:center; }
  .mp-avatar { width:68px; height:68px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; margin:0 auto 10px; }
  .mp-name { font-size:20px; font-weight:700; }
  .mp-role { font-size:13px; opacity:0.75; margin-top:3px; }
  .mp-body { padding:20px; }
  .mp-row { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid #f5f5f5; font-size:13px; }
  .mp-row:last-child { border:none; }
  .mp-label { color:#888; width:60px; flex-shrink:0; }
  .mp-footer { padding:14px 20px; border-top:1px solid var(--border); text-align:right; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">🌿 Green Carbon</div>
    <div class="subtitle">組織図</div>
  </div>
  <a href="../index.html">← ランチャーに戻る</a>
</header>

<div class="toolbar">
  <span class="toolbar-stats">社員数: <strong id="statTotal">—</strong></span>
  <span class="toolbar-stats">部門数: <strong id="statDepts">—</strong></span>
  <div style="margin-left:auto;display:flex;gap:8px">
    <button class="btn btn-active" id="treeBtn" onclick="setView('tree')">🌳 ツリー</button>
    <button class="btn btn-secondary" id="deptBtn" onclick="setView('dept')">🏢 部門別</button>
    <button class="btn btn-secondary" onclick="window.print()">🖨️ 印刷</button>
  </div>
</div>

<div class="chart-wrapper">
  <div id="treeView"></div>
  <div class="dept-list-view" id="deptView"></div>
</div>

<!-- Profile Modal -->
<div class="modal-bg" id="profileModal">
  <div class="modal-panel">
    <div class="mp-header">
      <div class="mp-avatar" id="mpAv"></div>
      <div class="mp-name" id="mpName"></div>
      <div class="mp-role" id="mpRole"></div>
    </div>
    <div class="mp-body" id="mpBody"></div>
    <div class="mp-footer"><button class="btn btn-secondary" onclick="closeModal()">閉じる</button></div>
  </div>
</div>

<script>
const DATA_VERSION = '20260430-slack';
const COLORS = ['#2d6a4f','#40916c','#1b4332','#52b788','#2563eb','#7c3aed','#b45309','#be185d','#0e7490','#9a3412'];

// Load employees from localStorage (shared with gc_directory)
let employees = [];
if (localStorage.getItem('gc_directory_version') === DATA_VERSION) {
  employees = JSON.parse(localStorage.getItem('gc_directory') || '[]');
}
if (!employees.length) {
  employees = [
    {"name": "大北 潤", "role": "代表取締役", "dept": "取締役会", "email": "j.okita@green-carbon.inc", "slack": "U09J5K73ZRS", "start": "2025-01-01", "location": "東京", "manager": ""},
    {"name": "土居 海斗", "role": "リーダー", "dept": "国内企画部", "email": "k.doi@green-carbon.inc", "slack": "U099FND80J2", "start": "2023-03-09", "location": "東京", "manager": ""},
    {"name": "横山 治生", "role": "リーダー", "dept": "海外企画部", "email": "h.yokoyama@green-carbon.inc", "slack": "U09QP1ZCW5Q", "start": "2023-03-09", "location": "東京", "manager": ""},
    {"name": "井家 良輔", "role": "部長", "dept": "ESGコンサルティング部", "email": "r.ike@green-carbon.inc", "slack": "U09PHBF81DJ", "start": "2023-04-01", "location": "東京", "manager": ""},
    {"name": "吉見 俊哉", "role": "リーダー", "dept": "国内事業部", "email": "y.yoshimi@green-carbon.inc", "slack": "U09QKHL51HT", "start": "2023-05-01", "location": "東京", "manager": ""},
    {"name": "野村 佑大", "role": "本部長", "dept": "HR室", "email": "y.nomura@green-carbon.inc", "slack": "U09KA9U02DV", "start": "2023-09-01", "location": "東京", "manager": ""},
    {"name": "藤本 翔大", "role": "リーダー", "dept": "R&D", "email": "s.fujimoto@green-carbon.inc", "slack": "U09QGK1BNR1", "start": "2023-11-01", "location": "東京", "manager": ""},
    {"name": "妹尾 聖人", "role": "取締役", "dept": "取締役会", "email": "emp029@green-carbon.inc", "slack": "", "start": "2024-07-01", "location": "東京", "manager": ""},
    {"name": "山本 高太郎", "role": "取締役", "dept": "取締役会", "email": "k.yamamoto@green-carbon.inc", "slack": "U09J5K4FWHJ", "start": "2025-02-01", "location": "東京", "manager": ""},
    {"name": "田邉 健介", "role": "メンバー", "dept": "取締役会", "email": "k.tanabe@green-carbon.inc", "slack": "U09J5K6DKHA", "start": "2025-01-01", "location": "東京", "manager": ""},
    {"name": "蔭山 隼人", "role": "部長", "dept": "経営企画部", "email": "h.kageyama@green-carbon.inc", "slack": "U09J5K5K9K6", "start": "2025-04-15", "location": "東京", "manager": ""},
    {"name": "宮本 晋一郎", "role": "部長", "dept": "国内事業部", "email": "s.miyamoto@green-carbon.inc", "slack": "U09QP1YSUCA", "start": "2025-04-01", "location": "東京", "manager": ""}
  ];
}

function initials(name) {
  const parts = name.trim().split(/[\s]+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

function avatarColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % COLORS.length;
  return COLORS[Math.abs(h)];
}

function buildDeptMap() {
  const map = {};
  for (const e of employees) {
    if (!map[e.dept]) map[e.dept] = [];
    map[e.dept].push(e);
  }
  return map;
}

function showProfile(emp) {
  const color = avatarColor(emp.name);
  document.getElementById('mpAv').textContent = initials(emp.name);
  document.getElementById('mpAv').style.background = color;
  document.getElementById('mpName').textContent = emp.name;
  document.getElementById('mpRole').textContent = emp.role || '';
  document.getElementById('mpBody').innerHTML = `
    <div class="mp-row"><span class="mp-label">部門</span><span>${emp.dept || '-'}</span></div>
    <div class="mp-row"><span class="mp-label">メール</span><span style="word-break:break-all">${emp.email || '-'}</span></div>
    <div class="mp-row"><span class="mp-label">💬 Slack</span><span>${emp.slack || '-'}</span></div>
    <div class="mp-row"><span class="mp-label">入社日</span><span>${emp.start || '-'}</span></div>
    <div class="mp-row"><span class="mp-label">勤務地</span><span>${emp.location || '-'}</span></div>
  `;
  document.getElementById('profileModal').classList.add('open');
}

function closeModal() { document.getElementById('profileModal').classList.remove('open'); }

// DEPT ICONS
const DEPT_ICONS = {
  'リサーチチーム': '🔬',
  '国内企画部': '🇯🇵',
  'オペレーションチーム': '⚙️',
  'ビジネスディベロップメントチーム': '🚀',
  'ESGコンサルティング部': '🌱',
  'データチーム': '📊',
  '海外企画部': '🌐',
  'システムディベロップメントチーム': '💻',
  '国内事業部': '🏢',
  '取締役会': '👑',
  '経営企画部': '📋',
  'HR室': '👥',
  'R&D': '🧪',
  '広報室': '📣',
  'CXチーム': '💡',
  '事業企画チーム': '🗂️',
  '経理・財務チーム': '💰',
  '秋田チーム': '🍁',
  '海外クレジット事業本部': '💱',
  '北海道営業所': '🏔️',
  '北陸営業所': '🌊',
  '東北営業所': '🌸',
};

function renderTree() {
  const deptMap = buildDeptMap();
  const ceo = employees.find(e => e.role === '代表取締役' || e.dept === '取締役会' && e.role === '代表取締役') || employees[0];
  const directors = employees.filter(e => e.dept === '取締役会' && e !== ceo);
  const depts = Object.entries(deptMap)
    .filter(([d]) => d !== '取締役会')
    .sort((a, b) => b[1].length - a[1].length);

  const ceoColor = avatarColor(ceo.name);

  let html = `<div class="tree-view">
    <!-- CEO -->
    <div class="ceo-node" style="cursor:pointer" onclick="showProfile(${JSON.stringify(ceo).replace(/"/g,'&quot;')})">
      <div class="n-avatar">${initials(ceo.name)}</div>
      <div class="n-name">${ceo.name}</div>
      <div class="n-role">${ceo.role}</div>
    </div>
    <div class="v-line"></div>`;

  // Directors row
  if (directors.length > 0) {
    html += `<div class="director-row">`;
    for (const d of directors) {
      html += `<div class="director-node" style="cursor:pointer" onclick="showProfile(${JSON.stringify(d).replace(/"/g,'&quot;')})">
        <div class="n-avatar" style="background:${avatarColor(d.name)}">${initials(d.name)}</div>
        <div class="n-name">${d.name}</div>
        <div class="n-role">${d.role}</div>
        <div class="n-dept">取締役会</div>
      </div>`;
    }
    html += `</div>
    <div class="v-line" style="height:40px"></div>`;
  }

  // Section label
  html += `<div style="font-size:13px;color:#888;margin-bottom:20px;text-align:center">── 各部門 ──</div>`;

  // Departments grid
  html += `<div class="dept-grid">`;
  for (const [deptName, members] of depts) {
    const icon = DEPT_ICONS[deptName] || '📁';
    const leader = members.find(m => ['部長','本部長','代表取締役','取締役','リーダー'].includes(m.role));
    const others = members.filter(m => m !== leader).slice(0, 4);
    const moreCount = members.length - (leader ? 1 : 0) - others.length;

    html += `<div class="dept-card" onclick="setView('dept')">
      <div class="dept-card-header">
        <div class="d-name">${icon} ${deptName}</div>
        <div class="d-count">${members.length}名</div>
      </div>
      <div class="dept-card-body">`;

    if (leader) {
      html += `<div class="d-leader">${leader.name}</div>
        <div class="d-leader-role">${leader.role}</div>`;
    }

    html += `<div class="d-members">`;
    for (const m of others) {
      html += `<span class="d-chip">${m.name.split(' ')[0]}</span>`;
    }
    if (moreCount > 0) {
      html += `<span class="d-chip">+${moreCount}名</span>`;
    }
    html += `</div></div></div>`;
  }
  html += `</div></div>`;

  document.getElementById('treeView').innerHTML = html;
}

function renderDeptList() {
  const deptMap = buildDeptMap();
  const depts = Object.entries(deptMap).sort((a,b) => b[1].length - a[1].length);

  let html = '';
  for (const [deptName, members] of depts) {
    const icon = DEPT_ICONS[deptName] || '📁';
    const sortedMembers = [...members].sort((a,b) => {
      const order = {'代表取締役':0,'取締役':1,'部長':2,'本部長':3,'リーダー':4,'メンバー':5};
      return (order[a.role]??5) - (order[b.role]??5);
    });

    html += `<div class="dept-section">
      <div class="dept-section-header"><h3>${icon} ${deptName}</h3><span class="dc">${members.length}名</span></div>
      <div class="dept-members">`;

    for (const m of sortedMembers) {
      const color = avatarColor(m.name);
      html += `<div class="member-card" style="cursor:pointer" onclick="showProfile(${JSON.stringify(m).replace(/"/g,'&quot;')})">
        <div class="member-avatar" style="background:${color}">${initials(m.name)}</div>
        <div class="member-info">
          <div class="m-name">${m.name}</div>
          ${m.role ? `<div class="m-role">${m.role}</div>` : ''}
        </div>
      </div>`;
    }

    html += `</div></div>`;
  }

  document.getElementById('deptView').innerHTML = html;
}

function setView(v) {
  document.getElementById('treeView').style.display = v === 'tree' ? '' : 'none';
  document.getElementById('deptView').style.display = v === 'dept' ? 'block' : 'none';
  document.getElementById('treeBtn').className = v === 'tree' ? 'btn btn-active' : 'btn btn-secondary';
  document.getElementById('deptBtn').className = v === 'dept' ? 'btn btn-active' : 'btn btn-secondary';
}

function updateStats() {
  const deptMap = buildDeptMap();
  document.getElementById('statTotal').textContent = employees.length + '名';
  document.getElementById('statDepts').textContent = Object.keys(deptMap).length;
}

// Initialize
updateStats();
renderTree();
renderDeptList();
setView('tree');
</script>
</body>
</html>
